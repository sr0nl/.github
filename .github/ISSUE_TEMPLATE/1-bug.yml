name: "🐛 Bug Report"
description: "Something is broken or not behaving the way it should"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        The more reproducible the report, the faster the fix. Fill in what you can.

  - type: textarea
    id: summary
    attributes:
      label: "What happened?"
      description: "A short description of the problem"
      placeholder: "e.g. After logging in I get bounced back to the home page with an 'unauthorized' message"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Enter ...
        4. Error appears
    validations:
      required: false

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: "Expected vs actual"
      value: |
        **Expected:**
        (what should have happened)

        **Actual:**
        (what actually happened, including any error)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Error messages / console / logs (optional)"
      description: "Paste any error output, console logs, or API responses"
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: "Screenshots / recordings (optional)"
      placeholder: "Drag images here or paste a link"
    validations:
      required: false
